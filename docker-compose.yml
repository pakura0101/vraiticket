services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vraiticket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-vraiticket_db}
      POSTGRES_USER:     ${POSTGRES_USER:-vraiticket_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vraiticket_user} -d ${POSTGRES_DB:-vraiticket_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vraiticket_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vraiticket_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vraiticket_net

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./vraiticket
      dockerfile: Dockerfile
    container_name: vraiticket_api
    restart: unless-stopped
    env_file: ./vraiticket/.env
    environment:
      DATABASE_URL:          postgresql://${POSTGRES_USER:-vraiticket_user}:${POSTGRES_PASSWORD:-strongpassword}@postgres:5432/${POSTGRES_DB:-vraiticket_db}
      REDIS_URL:             redis://redis:6379/0
      CELERY_BROKER_URL:     redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - uploads:/app/uploads
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - vraiticket_net

  # ── Alembic migrations (runs once then exits) ───────────────────────────────
  migrate:
    build:
      context: ./vraiticket
      dockerfile: Dockerfile
    container_name: vraiticket_migrate
    restart: "no"
    env_file: ./vraiticket/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vraiticket_user}:${POSTGRES_PASSWORD:-strongpassword}@postgres:5432/${POSTGRES_DB:-vraiticket_db}
    command: >
      sh -c "alembic upgrade head && echo '✓ Migrations complete'"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vraiticket_net

  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./vraiticket
      dockerfile: Dockerfile
    container_name: vraiticket_worker
    restart: unless-stopped
    env_file: ./vraiticket/.env
    environment:
      DATABASE_URL:          postgresql://${POSTGRES_USER:-vraiticket_user}:${POSTGRES_PASSWORD:-strongpassword}@postgres:5432/${POSTGRES_DB:-vraiticket_db}
      REDIS_URL:             redis://redis:6379/0
      CELERY_BROKER_URL:     redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - uploads:/app/uploads
    command: celery -A worker.celery_app worker --beat --loglevel=info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - vraiticket_net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./vraiticket-frontend
      dockerfile: Dockerfile
      args:
        # The browser calls this URL — must be reachable from the user's machine,
        # not from inside the Docker network. Change to your server IP/domain.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    container_name: vraiticket_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - vraiticket_net

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local

# ── Network ──────────────────────────────────────────────────────────────────
networks:
  vraiticket_net:
    driver: bridge
