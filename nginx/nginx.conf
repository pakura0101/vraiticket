# =============================================================================
#  VraiTicket — Nginx reverse proxy configuration
#
#  Routes:
#    /api/v1/  → FastAPI (api:8000)
#    /docs     → FastAPI Swagger UI (api:8000)
#    /openapi  → FastAPI OpenAPI schema (api:8000)
#    /health   → FastAPI health check (api:8000)
#    /         → Next.js frontend (frontend:3000)
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Upstream services (Docker internal DNS)
    upstream api_upstream {
        server api:8000;
        keepalive 32;
    }

    upstream frontend_upstream {
        server frontend:3000;
        keepalive 32;
    }

    # ── Rate limiting ────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    server {
        listen 80;
        server_name _;       # catches everything — replace with your domain

        # Max upload size (for avatar + ticket attachments)
        client_max_body_size 10M;

        # ── Security headers ────────────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── FastAPI — API routes ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Longer timeout for file uploads
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Stricter rate limit on login
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=10 nodelay;
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── FastAPI docs / health ────────────────────────────────────────────
        location ~ ^/(docs|redoc|openapi\.json|health) {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Next.js — everything else ────────────────────────────────────────
        location / {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Required for Next.js HMR websocket in dev (not needed in prod but harmless)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
        }

        # ── Next.js static assets — long-lived cache ─────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend_upstream;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ── HTTPS server (uncomment when you have SSL certs) ────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     # ... same location blocks as above ...
    # }
    #
    # # Redirect HTTP to HTTPS
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
}